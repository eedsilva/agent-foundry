schemaVersion: '1'

# These capability numbers are routing priors for this application, not vendor benchmarks.
# Replace them with measurements from your own review/test outcomes.
models:
  - id: codex-default
    provider: codex
    model: '${CODEX_DEFAULT_MODEL:-}'
    enabled: true
    requireExplicitModel: false
    maxContextTokens: 100000
    canWriteWorkspace: true
    tags: [coding, repository, balanced]
    capabilities:
      planning: 0.82
      architecture: 0.84
      coding: 0.94
      review: 0.88
      repair: 0.94
      structuredOutput: 0.92
      speed: 0.66
      costEfficiency: 0.58
      reliability: 0.90

