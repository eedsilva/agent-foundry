services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start --workspace @agent-foundry/api
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATA_DIR: /app/data
      HARNESS_DIR: /app/harness
      WORKFLOWS_DIR: /app/workflows
      MODEL_CATALOG_PATH: /app/models/catalog.yaml
      RUN_WORKER_INLINE: 'false'
      EXECUTOR_MODE: mock
      # OpenTelemetry is off unless OTEL_EXPORTER_OTLP_ENDPOINT is set — no
      # bundled collector service; point this at your own OTLP-compatible target.
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # OTEL_SERVICE_NAME: agent-foundry-api
      # OTEL_TRACES_SAMPLER_RATIO: '1'
      # OTEL_SLOW_RUN_THRESHOLD_MS: '60000'
      # PERSISTENCE_MODE: postgres
      # DATABASE_URL: postgres://foundry:foundry@postgres:5432/foundry
      # Blob storage defaults to fs mode (bytes under DATA_DIR, signing secret
      # auto-derived there too) — nothing else to set. Uncomment to point at
      # the MinIO service below instead (or any S3-compatible endpoint,
      # including Supabase Storage's S3 API — see docs/OPERATIONS.md).
      # BLOB_STORE_MODE: s3
      # S3_ENDPOINT: http://minio:9000
      # S3_REGION: us-east-1
      # S3_BUCKET: agent-foundry
      # S3_ACCESS_KEY_ID: minioadmin
      # S3_SECRET_ACCESS_KEY: minioadmin
      # S3_FORCE_PATH_STYLE: 'true'
    volumes:
      - agent_data:/app/data
    ports:
      - '4000:4000'
    # depends_on:
    #   - minio

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start --workspace @agent-foundry/worker
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      HARNESS_DIR: /app/harness
      WORKFLOWS_DIR: /app/workflows
      MODEL_CATALOG_PATH: /app/models/catalog.yaml
      EXECUTOR_MODE: mock
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # OTEL_SERVICE_NAME: agent-foundry-worker
      # OTEL_TRACES_SAMPLER_RATIO: '1'
      # OTEL_SLOW_RUN_THRESHOLD_MS: '60000'
      # PERSISTENCE_MODE: postgres
      # DATABASE_URL: postgres://foundry:foundry@postgres:5432/foundry
      # Keep in sync with the api service's blob storage settings above.
      # BLOB_STORE_MODE: s3
      # S3_ENDPOINT: http://minio:9000
      # S3_REGION: us-east-1
      # S3_BUCKET: agent-foundry
      # S3_ACCESS_KEY_ID: minioadmin
      # S3_SECRET_ACCESS_KEY: minioadmin
      # S3_FORCE_PATH_STYLE: 'true'
    volumes:
      - agent_data:/app/data
    # depends_on:
    #   - minio

  # S3-compatible object storage for BLOB_STORE_MODE=s3. Uncomment this
  # block and the api/worker S3_* env vars above to switch off fs-mode
  # blob storage.
  # minio:
  #   image: minio/minio
  #   command: server /data --console-address :9001
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data
  #   ports:
  #     - '9000:9000'
  #     - '9001:9001'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: foundry
      POSTGRES_PASSWORD: foundry
      POSTGRES_DB: foundry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U foundry']
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start --workspace @agent-foundry/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  agent_data:
  postgres_data:
  # minio_data:
