name: security-audit

on:
  schedule:
    - cron: '17 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
