name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: 'true'
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Reject private registry URLs in package-lock.json
        run: |
          if grep -nE 'applied-caas-gateway|internal\.api\.openai\.org|artifactory/api/npm/npm-public' package-lock.json; then
            echo '::error::package-lock.json contains a private registry URL. Regenerate or normalize the lockfile before running CI.'
            exit 1
          fi

  format:
    name: format
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check

  lint:
    name: lint
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  architecture:
    name: architecture
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run architecture:check

  roadmap:
    name: roadmap
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run roadmap:check

  typecheck:
    name: typecheck
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: test
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          # Benchmark corpus fixtures pin real, historical commits as their
          # baselineRef and a test resolves them via `git cat-file`; the
          # default shallow (depth-1) checkout only fetches the PR head and
          # would make that resolution fail here even though it passes with
          # a full local clone.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build the standalone network-policy sidecar
        run: npm run build --workspace @agent-foundry/executors
      - run: npm test

  build:
    name: build
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  sandbox-sbom:
    name: sandbox-sbom
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Pull the pinned sandbox base image
        run: docker pull node@sha256:6c74791e557ce11fc957704f6d4fe134a7bc8d6f5ca4403205b2966bd488f6b3
      - name: Generate SBOM
        # Pinned by commit, not the floating v0 tag: this is the one third-party
        # (non actions/*) action in this workflow, and CodeQL flags floating tags
        # on third-party actions as a supply-chain risk.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: node@sha256:6c74791e557ce11fc957704f6d4fe134a7bc8d6f5ca4403205b2966bd488f6b3
          format: spdx-json
          output-file: sandbox-image.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-image-sbom
          path: sandbox-image.spdx.json
          retention-days: 90
